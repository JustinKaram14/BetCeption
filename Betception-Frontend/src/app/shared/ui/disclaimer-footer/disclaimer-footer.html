<footer class="disclaimer-footer">

    <p class="disclaimer-main">
      &#9888; <strong>{{ i18n.t('footer.disclaimer') }}</strong>
      <br *ngIf="i18n.language() === 'es'">
      {{ i18n.t('footer.copy') }}
    </p>
    <p class="disclaimer-sub">
      {{ i18n.t('footer.project') }}
    </p>
    <nav class="disclaimer-links">
      <a routerLink="/impressum">Impressum</a>

      <span class="divider">|</span>

    </nav>
  </div>
</footer>
