<div class="legal-page">
  <div class="legal-card">
    <h1>{{ content.title }}</h1>

    <section *ngFor="let section of content.sections">
      <h2>{{ section.heading }}</h2>
      <p *ngFor="let paragraph of section.paragraphs">
        {{ paragraph }}
      </p>
    </section>

    <a routerLink="/" class="back-link">&larr; {{ content.back }}</a>
  </div>
</div>
