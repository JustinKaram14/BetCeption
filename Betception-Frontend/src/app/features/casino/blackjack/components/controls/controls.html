<div class="bottom-ui-container">
  <div class="chip-row">
    <button
      *ngFor="let chip of chips"
      class="chip"
      [ngClass]="'chip-' + chip"
      [attr.data-testid]="'chip-' + chip"
      type="button"
      (click)="onChip(chip)"
      [disabled]="isRoundActive || busy"
    >
      {{ chip }}
    </button>
  </div>

  <div class="controls-panel">
    <div class="panel-section-left">
      <div class="info-display" *ngIf="balance !== null">
        {{ i18n.t('controls.balance') }}:
        <span>{{ balance | number:'1.0-0' }} {{ i18n.t('common.coins') }}</span>
      </div>
    </div>

    <div class="center-controls">
      <div class="action-buttons">
        <!-- Before round: only Deal button -->
        <button
          *ngIf="!isRoundActive"
          class="btn btn-deal"
          data-testid="deal-button"
          type="button"
          (click)="deal.emit()"
          [disabled]="!canDeal"
        >{{ i18n.t('controls.deal') }}</button>

        <!-- During round: Hit, Stand, Double, Split -->
        <ng-container *ngIf="isRoundActive">
          <button class="btn" data-testid="hit-button" type="button" (click)="hit.emit()" [disabled]="!canHit">{{ i18n.t('controls.hit') }}</button>
          <button class="btn" data-testid="stand-button" type="button" (click)="stand.emit()" [disabled]="!canStand">{{ i18n.t('controls.stand') }}</button>
          <button class="btn" data-testid="double-button" type="button" (click)="double.emit()" [disabled]="!canDouble">{{ i18n.t('controls.double') }}</button>
          <button *ngIf="canSplitHand" class="btn" data-testid="split-button" type="button" (click)="split.emit()" [disabled]="!canSplit">{{ i18n.t('controls.split') }}</button>
        </ng-container>

        <button
          class="pill-slot"
          data-testid="powerup-button"
          type="button"
          [ngClass]="pillSlotClasses"
          [disabled]="!activePowerup && busy"
          [attr.aria-disabled]="!!activePowerup || busy"
          [attr.aria-label]="pillAriaLabel"
          [attr.aria-describedby]="activePowerup ? 'pill-slot-tooltip' : null"
          (click)="onPillSlot()"
        >
          <span class="pill-slot__pill" *ngIf="activePowerup || pillExpiredCode" aria-hidden="true"></span>
          <span class="pill-slot__uses" *ngIf="pillUses !== null">{{ pillUses }}</span>
          <span class="pill-slot__tooltip" id="pill-slot-tooltip" role="tooltip" *ngIf="activePowerup">
            <span class="pill-slot__tooltip-title">{{ activePillTitle }}</span>
            <span class="pill-slot__tooltip-text">{{ activePillDescription }}</span>
          </span>
        </button>

        <button
          *ngIf="!isRoundActive"
          class="btn reset-btn"
          data-testid="reset-bet-button"
          type="button"
          (click)="resetBet.emit()"
          [disabled]="busy"
        >{{ i18n.t('controls.reset') }}</button>
      </div>
    </div>

    <div class="panel-section-right">
      <div class="info-display">
        {{ i18n.t('controls.bet') }}:
        <span>{{ betAmount | number: '1.0-0' }} {{ i18n.t('common.coins') }}</span>
      </div>
    </div>
  </div>
</div>
