<div class="bottom-ui-container">
  <div class="controls-panel">
    <div class="panel-section-left">
      <div class="info-display">
        {{ i18n.t('controls.bet') }}:
        <span>{{ betAmount | number: '1.0-2' }} </span>
      </div>
      <div class="info-display" *ngIf="balance !== null">
        {{ i18n.t('controls.balance') }}:
        <span>{{ balance | number:'1.0-0' }} {{ i18n.t('common.coins') }}</span>
      </div>
      <div class="info-display">
        {{ i18n.t('controls.round') }}:
        <span>{{ roundLabel }}</span>
      </div>
    </div>

    <div class="center-controls">
      <div class="action-buttons">
        <button class="btn" (click)="deal.emit()" [disabled]="!canDeal">{{ i18n.t('controls.deal') }}</button>
        <button class="btn" (click)="hit.emit()" [disabled]="!canHit">{{ i18n.t('controls.hit') }}</button>
        <button class="btn" (click)="stand.emit()" [disabled]="!canStand">{{ i18n.t('controls.stand') }}</button>
        <button class="btn" (click)="settle.emit()" [disabled]="!canSettle">{{ i18n.t('controls.settle') }}</button>
      </div>
    </div>

    <div class="panel-section-right">
      <div class="betting-controls">
        <button
          *ngFor="let chip of chips"
          class="chip"
          [ngClass]="'chip-' + chip"
          (click)="onChip(chip)"
          [disabled]="isRoundActive || busy"
        >
          +{{ chip }}
        </button>
        <button class="btn reset-btn" (click)="resetBet.emit()" [disabled]="isRoundActive || busy">{{ i18n.t('controls.reset') }}</button>
      </div>
    </div>
  </div>
</div>
