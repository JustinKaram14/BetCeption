<div class="hand-container" [class.active]="isActive">
  <div class="hand-label">{{ label }}</div>
  <div class="score" [ngClass]="{ 'score-updated': scoreAnimated }">
    {{ displayScore }}
  </div>

  <div class="hand" *ngIf="cards.length; else emptyHand">
    <div
      *ngFor="let item of displayCards; trackBy: trackByCard"
      [ngClass]="cardClasses(item.card, item.index)"
      [class.dealing]="isCardDealing(item.card)"
      [style.animation-delay]="cardDelay(item.card)"
    >
      <div class="card-back-face"></div>
      <div class="card-face">
        <div class="card-rank top">{{ item.card.rank }}</div>
        <div class="card-suit">{{ suitSymbol(item.card.suit) }}</div>
        <div class="card-rank bottom">{{ item.card.rank }}</div>
      </div>
    </div>
  </div>

  <ng-template #emptyHand>
    <div class="empty-hand">{{ i18n.t('hand.empty') }}</div>
  </ng-template>

  <div class="hand-status" *ngIf="statusLabel">{{ statusLabel }}</div>
</div>
