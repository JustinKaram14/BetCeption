<div class="powerup-overlay" (click)="close.emit()">
  <div class="powerup-modal" (click)="$event.stopPropagation()">
    <h2 class="modal-title">{{ i18n.t('powerup.pillShopTitle') }}</h2>
    <p class="modal-subtitle">
      {{ i18n.t('powerup.pillShopSubtitle') }}
    </p>

    <div class="pill-options">
      <article
        class="pill-card"
        *ngFor="let code of pillCodes"
        [ngClass]="getCopy(code).accentClass"
        [style.--pill-color]="getCopy(code).color"
      >
        <div class="pill-visual" aria-hidden="true"></div>
        <h3>{{ getPillTitle(code) }}</h3>
        <p>{{ getPillDescription(code) }}</p>
        <button
          class="btn btn-pill"
          type="button"
          [disabled]="!canUse(code)"
          (click)="onUse(code)"
        >
          {{ getButtonLabel(code) }}
        </button>
        <span class="inventory-hint" *ngIf="getOwnedQuantity(code) > 0">
          {{ i18n.t('powerup.inventory') }}: {{ getOwnedQuantity(code) | number:'1.0-0' }}
        </span>
      </article>
    </div>

    <button class="btn btn-cancel" type="button" (click)="close.emit()">{{ i18n.t('common.cancel') }}</button>
  </div>
</div>
