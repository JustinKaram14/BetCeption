<div class="page-wrapper">
  <div class="app-container">
    <a
      class="btn home-btn"
      routerLink="/homepage"
      [attr.aria-label]="i18n.t('common.home')"
      [title]="i18n.t('common.home')"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M3 11.5 12 4l9 7.5" />
        <path d="M5.5 10.5V20h13v-9.5" />
        <path d="M9.5 20v-5h5v5" />
      </svg>
    </a>

    <div class="peek-badge" *ngIf="peekCard !== null && isRoundActive">
      {{ i18n.t('powerup.peek.reveal') }} {{ peekCard.rank }}{{ peekCard.suit }}
    </div>

    <app-level-progress
      class="game-level-progress"
      [progress]="levelProgress"
      orientation="vertical"
      [compact]="true"
    ></app-level-progress>

    <app-table
      [dealerHand]="round?.dealerHand ?? null"
      [playerHand]="round?.playerHand ?? null"
      [activeHand]="activeHand"
      [showBlackjackBanner]="showBlackjackBanner"
    ></app-table>

    <div class="message error" *ngIf="error">{{ error }}</div>

    <!-- Level-Up Crate notification -->
    <div class="levelup-crate-toast" *ngIf="levelUpCrate">
      <div class="levelup-crate-inner">
        <div class="levelup-crate-icon" [attr.data-tier]="levelUpCrate.tier">🎁</div>
        <div class="levelup-crate-text">
          <strong>Level Up!</strong>
          <span>Du hast eine <em>{{ levelUpCrate.tierLabel }}</em> Kiste erhalten!</span>
        </div>
        <button class="btn levelup-crate-dismiss" (click)="onDismissLevelUpCrate()">✕</button>
      </div>
    </div>

    <!-- Round-over overlay -->
    <div class="round-over-overlay" *ngIf="showRoundOverlay">
      <div class="round-over-card">
        <div class="round-over-result"
             [class.won]="roundOutcome?.won"
             [class.lost]="roundOutcome?.lost"
             [class.push]="roundOutcome?.push">
          {{ roundOutcome?.headline }}
        </div>
        <div class="round-over-dealer" *ngIf="roundOutcome?.dealerInfo">
          {{ roundOutcome?.dealerInfo }}
        </div>
        <div class="round-over-amount" *ngIf="roundOutcome?.detail">
          {{ roundOutcome?.detail }}
        </div>
        <div class="round-over-actions">
          <button class="btn btn-neue-runde" (click)="onNextRound()">{{ i18n.t('blackjack.newRound') }}</button>
          <a class="btn btn-aufhoeren" routerLink="/homepage">{{ i18n.t('blackjack.quit') }}</a>
        </div>
      </div>
    </div>

    <!-- Mid-round action powerup buttons -->
    <div class="powerup-action-bar" *ngIf="canUseActionPowerups">
      <button
        class="btn btn-action-powerup"
        type="button"
        *ngIf="hasPeekCard && !peekCard"
        (click)="onPeekCard()"
      >{{ i18n.t('powerup.peekBtn') }}</button>
      <button
        class="btn btn-action-powerup"
        type="button"
        *ngIf="hasUndoHit && (round?.playerHand?.cards?.length ?? 0) > 2"
        (click)="onUndoHit()"
      >{{ i18n.t('powerup.undoBtn') }}</button>
      <button
        class="btn btn-action-powerup"
        type="button"
        *ngIf="hasCardSwap && lastPlayerCardId"
        (click)="onSwapLastCard()"
      >{{ i18n.t('powerup.swapBtn') }}</button>
    </div>

    <app-controls
      [betAmount]="betAmount"
      [balance]="balance"
      [roundStatus]="round?.status ?? null"
      [playerHandStatus]="playerHandStatus"
      [busy]="!!busyAction"
      [activePowerupCodes]="activePowerupCodes"
      (placeBet)="onPlaceBet($event)"
      (resetBet)="onResetBet()"
      (deal)="onDeal()"
      (hit)="onHit()"
      (stand)="onStand()"
      (openPowerupMenu)="onOpenPowerupMenu()"
    ></app-controls>
  </div>

  <app-powerup-menu
    *ngIf="showPowerupMenu"
    [inventory]="inventory"
    [availablePowerups]="availablePowerups"
    [roundId]="round?.id ?? null"
    [roundActive]="isRoundActive"
    [balance]="balance"
    [userLevel]="userLevel"
    [pendingTypeIds]="pendingPowerupTypeIds"
    (purchase)="onPurchasePowerup($event)"
    (toggleQueue)="onToggleQueue($event)"
    (close)="onClosePowerupMenu()"
  ></app-powerup-menu>
</div>
