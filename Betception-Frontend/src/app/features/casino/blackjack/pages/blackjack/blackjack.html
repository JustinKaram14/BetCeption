<div class="page-wrapper">
  <div class="app-container">
    <a
      class="btn home-btn"
      routerLink="/homepage"
      [attr.aria-label]="i18n.t('common.home')"
      [title]="i18n.t('common.home')"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M3 11.5 12 4l9 7.5" />
        <path d="M5.5 10.5V20h13v-9.5" />
        <path d="M9.5 20v-5h5v5" />
      </svg>
    </a>

    <app-level-progress
      class="game-level-progress"
      [progress]="levelProgress"
      orientation="vertical"
      [compact]="true"
    ></app-level-progress>

    <app-table
      [dealerHand]="round?.dealerHand ?? null"
      [playerHand]="round?.playerHand ?? null"
      [splitHands]="round?.splitHands ?? []"
      [activeHand]="activeHand"
      [showBlackjackBanner]="showBlackjackBanner"
    ></app-table>

    <div class="message error" *ngIf="error">{{ error }}</div>

    <!-- Level-Up Crate notification -->
    <div class="levelup-crate-toast" *ngIf="levelUpCrate">
      <div class="levelup-crate-inner">
        <div class="levelup-crate-icon" [attr.data-tier]="levelUpCrate.tier" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M4 8 12 4l8 4-8 4-8-4Z" />
            <path d="M4 8v8l8 4 8-4V8" />
            <path d="M12 12v8" />
          </svg>
        </div>
        <div class="levelup-crate-text">
          <strong>Level Up!</strong>
          <span>Du hast eine <em>{{ levelUpCrate.tierLabel }}</em> Kiste erhalten!</span>
        </div>
        <button class="btn levelup-crate-dismiss" (click)="onDismissLevelUpCrate()">X</button>
      </div>
    </div>

    <!-- Round-over overlay -->
    <div class="round-over-overlay" *ngIf="showRoundOverlay">
      <div class="round-over-card">
        <div class="round-over-result"
             [class.won]="roundOutcome?.won"
             [class.lost]="roundOutcome?.lost"
             [class.push]="roundOutcome?.push">
          {{ roundOutcome?.headline }}
        </div>
        <div class="round-over-dealer" *ngIf="roundOutcome?.dealerInfo">
          {{ roundOutcome?.dealerInfo }}
        </div>
        <div class="round-over-amount" *ngIf="roundOutcome?.detail">
          {{ roundOutcome?.detail }}
        </div>
        <div class="round-over-actions">
          <button class="btn btn-neue-runde" (click)="onNextRound()">{{ i18n.t('blackjack.newRound') }}</button>
          <a class="btn btn-aufhoeren" routerLink="/homepage">{{ i18n.t('blackjack.quit') }}</a>
        </div>
      </div>
    </div>

    <app-controls
      [betAmount]="betAmount"
      [balance]="balance"
      [roundStatus]="round?.status ?? null"
      [playerHandStatus]="playerHandStatus"
      [busy]="!!busyAction"
      [activePowerup]="activePowerup"
      [pillPulse]="pillPulse"
      [pillExpiredCode]="pillExpiredCode"
      [playerCardCount]="activePlayerCardCount"
      [canSplitHand]="canSplitHandNow"
      (placeBet)="onPlaceBet($event)"
      (resetBet)="onResetBet()"
      (deal)="onDeal()"
      (hit)="onHit()"
      (stand)="onStand()"
      (double)="onDouble()"
      (split)="onSplit()"
      (openPowerupMenu)="onOpenPowerupMenu()"
    ></app-controls>
  </div>

  <app-powerup-menu
    *ngIf="showPowerupMenu"
    [inventory]="inventory"
    [availablePowerups]="availablePowerups"
    [activePowerup]="activePowerup"
    [balance]="balance"
    [userLevel]="userLevel"
    (purchase)="onPurchasePowerup($event)"
    (equip)="onEquipPowerup($event)"
    (close)="onClosePowerupMenu()"
  ></app-powerup-menu>
</div>
