<div class="home-container">
  <app-hero></app-hero>

  <div class="main-content">
    <app-neon-card class="leaderboard-card">
      <app-leaderboard></app-leaderboard>
    </app-neon-card>

    <div class="right-column">
      <app-neon-card class="auth-card">
        <ng-container *ngIf="isAuthenticated$ | async; else loginPanel">
          <div class="user-panel">
            <div class="user-panel__greeting">
              Eingeloggt als
              <strong>{{ (user$ | async)?.username }}</strong>
            </div>
            <button class="btn logout-btn" (click)="onLogout()">Abmelden</button>
          </div>
        </ng-container>

        <ng-template #loginPanel>
          <app-auth-panel
            (login)="onLogin($event)"
            (register)="onRegister($event)">
          </app-auth-panel>
        </ng-template>
      </app-neon-card>

      <app-neon-card class="cta-card">
        <app-cta-panel
          (enter)="onEnter()"
          (rewards)="onRewards()">
        </app-cta-panel>
      </app-neon-card>
    </div>
  </div>

  <app-disclaimer-footer></app-disclaimer-footer>
</div>

<app-daily-reward-modal
  *ngIf="showRewardModal"
  [state]="rewardState"
  (closed)="closeRewardModal()">
</app-daily-reward-modal>

<app-toast-container></app-toast-container>
