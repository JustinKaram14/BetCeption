<div class="home-container" data-testid="homepage-root">
  <div class="top-actions" data-testid="homepage-top-actions">
    <button class="how-to-play-btn" data-testid="how-to-play-button" type="button" (click)="openHowToPlay()">
      {{ i18n.t('common.howToPlay') }}
    </button>
    <app-settings-menu></app-settings-menu>
  </div>

  <app-hero></app-hero>

  <div class="main-content" [style.flex-direction]="isNarrow ? 'column' : null" data-testid="homepage-main-content">
    <app-neon-card class="leaderboard-card">
      <app-leaderboard></app-leaderboard>
    </app-neon-card>

    <div class="right-column">
      <app-neon-card class="auth-card">
        <ng-container *ngIf="isAuthenticated$ | async; else loginPanel">
            <div class="user-panel" data-testid="homepage-user-panel">
              <div class="user-panel__greeting" data-testid="homepage-user-greeting">
                {{ i18n.t('home.loggedInAs') }}
                <strong>{{ (user$ | async)?.username }}</strong>
              </div>
              <div class="user-panel__actions">
                <button class="btn logout-btn" data-testid="logout-button" type="button" (click)="onLogout()">{{ i18n.t('home.logout') }}</button>
                <button class="btn profile-btn" data-testid="profile-button" type="button" (click)="openProfileModal()">
                  <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
                    <path d="M4 21a8 8 0 0 1 16 0" />
                  </svg>
                  {{ profileButtonLabel }}
                </button>
              </div>
              <app-level-progress
                class="user-level-progress"
                [progress]="walletSummary?.levelProgress ?? null"
                orientation="horizontal"
              ></app-level-progress>
            </div>
        </ng-container>

        <ng-template #loginPanel>
          <app-auth-panel
            (login)="onLogin($event)"
            (register)="onRegister($event)">
          </app-auth-panel>
        </ng-template>
      </app-neon-card>

      <app-neon-card class="cta-card">
        <app-cta-panel
          (enter)="onEnter()"
          (rewards)="onRewards()">
        </app-cta-panel>
      </app-neon-card>
    </div>
  </div>

  <app-disclaimer-footer></app-disclaimer-footer>
</div>

<app-daily-reward-modal
  *ngIf="showRewardModal"
  (closed)="closeRewardModal()"
  (claimed)="onRewardClaimed($event)">
</app-daily-reward-modal>

<app-how-to-play-modal
  *ngIf="showHowToPlayModal"
  (closed)="closeHowToPlay()">
</app-how-to-play-modal>

<app-profile-modal
  *ngIf="showProfileModal"
  (closed)="closeProfileModal()"
  (balanceUpdated)="onCrateBalanceUpdated($event)">
</app-profile-modal>

<app-toast-container></app-toast-container>
