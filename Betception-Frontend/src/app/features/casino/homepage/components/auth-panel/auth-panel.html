<div class="auth-container">
  <div class="auth-toggle">
    <button [class.active]="tab==='login'" (click)="onTabChange('login')">{{ i18n.t('auth.login') }}</button>
    <button [class.active]="tab==='register'" (click)="onTabChange('register')">{{ i18n.t('auth.register') }}</button>
  </div>

  <form class="auth-form" (ngSubmit)="submit()">
    <input
      type="email"
      [placeholder]="i18n.t('auth.emailPlaceholder')"
      [(ngModel)]="email"
      name="email"
      autocomplete="email">

    <input
      *ngIf="tab==='register'"
      type="text"
      [placeholder]="i18n.t('auth.usernamePlaceholder')"
      [(ngModel)]="username"
      name="username"
      autocomplete="nickname">

    <input
      type="password"
      [placeholder]="i18n.t('auth.passwordPlaceholder')"
      [(ngModel)]="password"
      name="password"
      [autocomplete]="tab === 'login' ? 'current-password' : 'new-password'">

    <button class="btn auth-btn" type="submit" [disabled]="!canSubmit()">
      {{ tab==='login' ? i18n.t('auth.submitLogin') : i18n.t('auth.createAccount') }}
    </button>
  </form>
</div>
