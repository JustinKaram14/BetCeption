<div class="auth-container">
  <div class="auth-toggle">
    <button [class.active]="tab==='login'" (click)="onTabChange('login')">Login</button>
    <button [class.active]="tab==='register'" (click)="onTabChange('register')">Register</button>
  </div>

  <form class="auth-form" (ngSubmit)="submit()">
    <input
      type="email"
      placeholder="E-Mail"
      [(ngModel)]="email"
      name="email"
      autocomplete="email">

    <input
      *ngIf="tab==='register'"
      type="text"
      placeholder="Benutzername (3–32 Zeichen)"
      [(ngModel)]="username"
      name="username"
      autocomplete="nickname">

    <input
      type="password"
      placeholder="Passwort (min. 8 Zeichen)"
      [(ngModel)]="password"
      name="password"
      [autocomplete]="tab === 'login' ? 'current-password' : 'new-password'">

    <div *ngIf="validationError" class="auth-validation-error">
      {{ validationError }}
    </div>

    <button class="btn auth-btn" type="submit" [disabled]="!canSubmit()">
      {{ tab==='login' ? 'LOGIN' : 'ACCOUNT ERSTELLEN' }}
    </button>
  </form>
</div>
