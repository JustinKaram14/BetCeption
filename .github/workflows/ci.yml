name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend: TypeScript build + Jest tests
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Betception-Backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Betception-Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build check
        run: npm run build

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: Betception-Backend/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Frontend: Angular build + Karma/Jasmine tests (headless)
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Betception-Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Betception-Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Angular build check
        run: npm run build

      - name: Run tests (headless Chrome)
        run: npm run test:ci
        env:
          # Ensures the Karma ChromeHeadless sandbox works on GitHub-hosted runners
          CHROMIUM_FLAGS: "--no-sandbox"

  # ─────────────────────────────────────────────────────────────
  # Summary gate — all jobs above must pass before merge
  # Use this job's name as the required status check in
  # Settings → Branches → Branch protection rules
  # ─────────────────────────────────────────────────────────────
  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "One or more jobs failed:"
            echo "  Backend:  ${{ needs.backend.result }}"
            echo "  Frontend: ${{ needs.frontend.result }}"
            exit 1
          fi
          echo "All tests passed ✅"
