name: Performance Tests

on:
  # Manuell auslösbar, z.B. vor Releases oder nach größeren Änderungen
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Backend-URL für die Tests (leer = lokale Perf-Umgebung)'
        required: false
        default: ''

  # Automatisch jeden Montag um 03:00 UTC
  schedule:
    - cron: '0 3 * * 1'

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance:
    name: k6 Performance Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Betception-Backend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Performance-Umgebung starten
        run: docker compose -f docker-compose.perf.yml up -d --build

      - name: Backend-Bereitschaft abwarten
        run: |
          echo "Warte auf Backend-Healthcheck..."
          for i in $(seq 1 40); do
            STATUS=$(docker compose -f docker-compose.perf.yml ps --format json backend-perf 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0].get('Health','') if isinstance(d,list) else d.get('Health',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "healthy" ]; then
              echo "Backend healthy nach ${i}x5s"
              break
            fi
            echo "  Versuch $i/40 (Status: ${STATUS:-unbekannt})..."
            sleep 5
          done
          curl -sf http://localhost:3001/health || (echo "Backend nicht erreichbar!" && exit 1)

      - name: Auth-Flow-Performance
        run: docker compose -f docker-compose.perf.yml --profile k6 run --rm k6 run --out json=/results/auth-results.json --summary-export /results/auth-summary.json /performance/k6/scenarios/auth-flow.js
        continue-on-error: true

      - name: Game-Flow-Performance
        run: docker compose -f docker-compose.perf.yml --profile k6 run --rm k6 run --out json=/results/game-results.json --summary-export /results/game-summary.json /performance/k6/scenarios/game-flow.js
        continue-on-error: true

      - name: Wallet-Flow-Performance
        run: docker compose -f docker-compose.perf.yml --profile k6 run --rm k6 run --out json=/results/wallet-results.json --summary-export /results/wallet-summary.json /performance/k6/scenarios/wallet-flow.js
        continue-on-error: true

      - name: Leaderboard-Performance
        run: docker compose -f docker-compose.perf.yml --profile k6 run --rm k6 run --out json=/results/leaderboard-results.json --summary-export /results/leaderboard-summary.json /performance/k6/scenarios/leaderboard.js
        continue-on-error: true

      - name: Performance-Umgebung stoppen
        if: always()
        run: docker compose -f docker-compose.perf.yml down -v


      - name: Quality Gate – Metriken auswerten
        run: |
          GATE_FAILED=0
          PAIRS=(
            "Auth-Flow:results/auth-summary.json"
            "Game-Flow:results/game-summary.json"
            "Wallet-Flow:results/wallet-summary.json"
            "Leaderboard:results/leaderboard-summary.json"
          )

          echo "================================================================"
          echo " Quality Gate – SRS-Performanceziele"
          echo "================================================================"

          for PAIR in "${PAIRS[@]}"; do
            LABEL="${PAIR%%:*}"
            FILE="${PAIR##*:}"
            echo ""
            echo "--- $LABEL ---"

            if [ ! -f "$FILE" ]; then
              echo "  ⚠️  Keine Ergebnisdatei – Szenario wurde übersprungen"
              GATE_FAILED=1
              continue
            fi

            FAILED_COUNT=$(jq '[.metrics[].thresholds[]? | select(.ok == false)] | length' "$FILE")

            if [ "$FAILED_COUNT" -eq 0 ]; then
              echo "  ✅ Alle Thresholds eingehalten"
            else
              echo "  ❌ $FAILED_COUNT Threshold-Verletzung(en):"
              jq -r '
                .metrics | to_entries[] |
                .key as $metric |
                (.value.thresholds // {}) | to_entries[] |
                select(.value.ok == false) |
                "    FAIL  \($metric): \(.key)"
              ' "$FILE"
              GATE_FAILED=1
            fi
          done

          echo ""
          echo "================================================================"
          if [ $GATE_FAILED -eq 0 ]; then
            echo " ✅ Quality Gate BESTANDEN – alle SRS-Ziele eingehalten"
          else
            echo " ❌ Quality Gate NICHT BESTANDEN – SRS-Ziele verletzt"
          fi
          echo "================================================================"
          exit $GATE_FAILED

      - name: Ergebnisse hochladen
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-performance-results-${{ github.run_number }}
          path: Betception-Backend/results/
          retention-days: 30
