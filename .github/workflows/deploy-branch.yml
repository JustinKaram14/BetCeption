name: Build deploy branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-branch
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Betception-Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Betception-Frontend

      - name: Build frontend
        run: npm run build
        working-directory: Betception-Frontend

      - name: Assemble deploy branch content
        shell: bash
        run: |
          rm -rf deploy-branch
          mkdir -p deploy-branch

          cp -R Betception-Frontend/dist/Betception-Frontend/browser/. deploy-branch/

          cat > deploy-branch/README.md <<'EOF'
          # Deploy branch

          Dieser Branch wird automatisch durch GitHub Actions erzeugt.

          Inhalt:
          - Gebautes Angular-Frontend (direkt im Root, bereit für Cloud86 Shared Hosting)
          - Backend wird separat über Railway deployed (Dockerfile im main-Branch)
          EOF

      - name: Publish deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy-branch
          publish_branch: deploy
          force_orphan: true

      - name: Health-Check Frontend
        if: ${{ vars.FRONTEND_URL != '' }}
        run: |
          echo "Warte 30s auf Plesk-Deployment..."
          sleep 30
          for i in $(seq 1 6); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "${{ vars.FRONTEND_URL }}")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Frontend erreichbar (HTTP $STATUS) ✅"
              exit 0
            fi
            echo "  Versuch $i/6 – HTTP $STATUS, warte 10s..."
            sleep 10
          done
          echo "Frontend nicht erreichbar nach allen Versuchen ❌"
          exit 1

      - name: Health-Check Backend
        if: ${{ vars.BACKEND_URL != '' }}
        run: |
          for i in $(seq 1 6); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "${{ vars.BACKEND_URL }}/health")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Backend erreichbar (HTTP $STATUS) ✅"
              exit 0
            fi
            echo "  Versuch $i/6 – HTTP $STATUS, warte 10s..."
            sleep 10
          done
          echo "Backend nicht erreichbar nach allen Versuchen ❌"
          exit 1
